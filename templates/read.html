<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand navbar-dark bg-dark" aria-label="Second navbar example">
      <div class="container-fluid">
        <a class="navbar-brand" href="/"><img src="/logo.png" alt="logo" /></a>
        <div class="collapse navbar-collapse" id="navbarsExample02">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/message.html">Send message</a></li>
            <li class="nav-item"><a class="nav-link active" href="/read">Read messages</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main class="container mt-4">
    <h1>All Messages</h1>
    {% if messages %}
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Time</th>
            <th>Username</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody>
          {% for timestamp, data in messages.items() %}
          <tr>
            <td>{{ timestamp }}</td>
            <td>{{ data.username }}</td>
            <td>{{ data.message }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <p class="text-muted">No messages yet. <a href="/message.html">Send one!</a></p>
    {% endif %}
  </main>
</body>
</html>
